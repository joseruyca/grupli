<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Grupli - organiza grupos privados, eventos, calendario, finanzas y torneos.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Grupli">
  <link rel="manifest" href="manifest.json">
  <title>Grupli</title>
  <style>
    html, body { width: 100%; min-height: 100%; margin: 0; padding: 0; background: #EEF3F8; }
    body { overflow: auto; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    #grupli-fallback { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px; color: #12263A; }
    #grupli-fallback-card { width: 100%; max-width: 420px; background: #FFFFFF; border: 1px solid #E4EFEE; border-radius: 24px; padding: 22px; box-shadow: 0 18px 42px rgba(17, 27, 52, 0.10); text-align: center; }
    #grupli-fallback-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    #grupli-fallback-text { font-size: 14px; line-height: 1.45; color: #6A7A89; font-weight: 700; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="grupli-fallback">
    <div id="grupli-fallback-card">
      <div id="grupli-fallback-title">Cargando Grupli</div>
      <div id="grupli-fallback-text">Preparando la app...</div>
    </div>
  </div>
  <script>
    (function () {
      var fallback = document.getElementById('grupli-fallback');
      var fallbackTitle = document.getElementById('grupli-fallback-title');
      var fallbackText = document.getElementById('grupli-fallback-text');
      var loaded = false;

      function showError(title, detail) {
        if (!fallback || loaded) return;
        fallback.style.display = 'flex';
        fallbackTitle.textContent = title || 'Grupli no ha podido arrancar';
        fallbackText.textContent = detail || 'Recarga la página. Si sigue ocurriendo, revisa el despliegue web.';
      }

      window.addEventListener('error', function (event) {
        showError('Error al abrir Grupli', (event && event.message) ? event.message : 'Error de JavaScript durante el arranque.');
      });

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event && event.reason ? String(event.reason) : 'Promesa rechazada durante el arranque.';
        showError('Error al iniciar Grupli', reason);
      });

      function loadFlutter() {
        var script = document.createElement('script');
        script.src = 'flutter_bootstrap.js?v=16327';
        script.async = true;
        script.onload = function () {
          loaded = true;
          if (fallback) fallback.style.display = 'none';
        };
        script.onerror = function () {
          showError('No se pudo cargar Grupli', 'No se ha podido cargar flutter_bootstrap.js. Revisa que Vercel esté sirviendo build/web correctamente.');
        };
        document.body.appendChild(script);
      }

      function clearOldFlutterCaches() {
        var tasks = [];
        if ('serviceWorker' in navigator) {
          tasks.push(navigator.serviceWorker.getRegistrations().then(function (registrations) {
            return Promise.all(registrations.map(function (registration) { return registration.unregister(); }));
          }));
        }
        if (window.caches && caches.keys) {
          tasks.push(caches.keys().then(function (keys) {
            return Promise.all(keys.filter(function (key) { return key.indexOf('flutter') >= 0 || key.indexOf('grupli') >= 0; }).map(function (key) { return caches.delete(key); }));
          }));
        }
        return Promise.all(tasks).catch(function () { return null; });
      }

      clearOldFlutterCaches().then(loadFlutter).catch(loadFlutter);
    })();
  </script>
</body>
</html>
